# Gradle memory settings - optimized for 6GB RAM devices/machines
# 2GB for Gradle daemon, 1GB for Kotlin daemon = ~3GB total, leaving ~3GB for OS + DEX
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC -XX:ParallelGCThreads=4 -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configureondemand=true

# Kotlin daemon settings - reduced for 6GB RAM
kotlin.daemon.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=384m

android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
kapt.incremental.apt=true
android.defaults.buildfeatures.resvalues=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
android.enableAppCompileTimeRClass=false
android.usesSdkInManifest.disallowed=false
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
android.r8.optimizedResourceShrinking=false
android.builtInKotlin=false

# R8 memory optimization for low-memory builds
android.r8.maxWorkers=2